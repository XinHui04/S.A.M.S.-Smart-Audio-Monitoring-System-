<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover lets us pad around notches via env(safe-area-inset-*) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="Real-time bullying-incident alerts for school staff — S.A.M.S.">
  <title>S.A.M.S. — Teacher Alerts</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SAMS Alerts">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Login view (UI shell — real auth in a later iteration) ───────────── -->
  <section class="login" id="login-view" hidden>
    <div class="login-logo">
      <svg width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
      </svg>
    </div>
    <h1>S.A.M.S. Teacher Alerts</h1>
    <p>Sign in to receive real-time bullying-incident alerts for your school zones.</p>

    <form class="login-form" id="login-form">
      <div class="field">
        <label for="login-name">Name</label>
        <input id="login-name" type="text" autocomplete="name" placeholder="e.g. Ms. Tan" required>
      </div>
      <div class="field">
        <label for="login-role">Role</label>
        <select id="login-role">
          <option value="teacher">Teacher</option>
          <option value="security">Security personnel</option>
          <option value="admin">Administrator</option>
        </select>
      </div>
      <button type="submit" class="btn-primary">Enter</button>
    </form>
    <p class="login-note">Prototype sign-in — secure login is coming in a later update.</p>
  </section>

  <!-- ── App ──────────────────────────────────────────────────────────────── -->
  <div class="app" id="app" hidden>

    <header class="topbar">
      <div class="topbar-logo">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
        S.A.M.S.
      </div>
      <div class="topbar-spacer"></div>
      <div class="ws-badge">
        <span class="ws-dot" id="ws-dot"></span>
        <span id="ws-status">Connecting…</span>
      </div>
      <button class="icon-btn" id="btn-refresh" aria-label="Refresh">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0 0 20.5 15"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-logout" aria-label="Sign out">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
      </button>
    </header>

    <div class="stats">
      <div class="stat"><div class="stat-label">Active</div><div class="stat-value red" id="stat-active">—</div></div>
      <div class="stat"><div class="stat-label">High</div><div class="stat-value amber" id="stat-high">—</div></div>
      <div class="stat"><div class="stat-label">Total</div><div class="stat-value blue" id="stat-total">—</div></div>
    </div>

    <div class="filters">
      <button class="chip active" data-filter="active">Active</button>
      <button class="chip" data-filter="high">High</button>
      <button class="chip" data-filter="medium">Medium</button>
      <button class="chip" data-filter="low">Low</button>
      <button class="chip" data-filter="all">All</button>
      <button class="chip" data-filter="resolved">Resolved</button>
    </div>

    <main class="list" id="list">
      <div class="empty">Loading alerts…</div>
    </main>

    <div class="topbar-spacer"></div>
    <div style="padding:0 14px calc(14px + env(safe-area-inset-bottom,0px)); color:var(--text-muted); font-size:11px; font-family:var(--font-mono);">
      Signed in as <span id="who">—</span>
    </div>
  </div>

  <!-- ── Detail overlay ───────────────────────────────────────────────────── -->
  <section class="detail" id="detail" aria-hidden="true">
    <header class="detail-head">
      <button class="icon-btn" id="detail-back" aria-label="Back">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="detail-head-title" id="detail-title">Incident</div>
    </header>
    <div class="detail-body" id="detail-body"></div>
  </section>

  <!-- ── Toasts ───────────────────────────────────────────────────────────── -->
  <div id="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
